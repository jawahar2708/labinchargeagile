<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Tracking - RPLMS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/equipment-tracking.css">
    <!-- Keep lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    </head>

<body>

    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="sidebar"></aside>

        <!-- MAIN PANEL -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggleBtn">&#9776;</button>
                    <div class="page-title-area">
                        <h1 class="page-title">Equipment Approvals</h1>
                        <ul class="breadcrumbs">
                            <li>Home</li>
                            <li>Equipment Approvals</li>
                        </ul>
                    </div>
                </div>

                <div class="header-right">
                    <button class="header-icon-btn">
                        <span class="icon">&#128276;</span>
                        <span class="icon-badge">3</span>
                    </button>
                    <div class="header-date-widget"></div>
                </div>
            </header>

            <!-- CONTENT BODY -->
            <div class="page-content-wrapper equipment-tracking-wrapper">

                <!-- KPI METRICS GRID -->
                <div
                    class="kpi-metrics-grid">
                    <div
                        class="kpi-metric-card">
                        <div
                            class="kpi-metric-title title-gray">
                            Total Team Requests</div>
                        <div id="kpiTotalTeams"
                            class="kpi-metric-value value-dark">0</div>
                    </div>
                    <div
                        class="kpi-metric-card">
                        <div
                            class="kpi-metric-title title-orange">
                            Pending Approvals</div>
                        <div id="kpiPendingTeams"
                            class="kpi-metric-value value-orange">0</div>
                    </div>
                    <div
                        class="kpi-metric-card">
                        <div
                            class="kpi-metric-title title-green">
                            Approved Requests</div>
                        <div id="kpiApprovedTeams"
                            class="kpi-metric-value value-green">0</div>
                    </div>
                    <div
                        class="kpi-metric-card">
                        <div
                            class="kpi-metric-title title-red">
                            Rejected & Flagged</div>
                        <div id="kpiRejectedTeams"
                            class="kpi-metric-value value-red">0</div>
                    </div>
                </div>

                <!-- SEARCH & FILTER BAR -->
                <div
                    class="filter-bar">
                    <div class="filter-search-wrapper">
                        <input type="text" id="teamSearchInput" placeholder="Search by Team ID, Team Name, or Asset..."
                            class="filter-input">
                    </div>
                    <select id="teamStatusFilter"
                        class="filter-select">
                        <option value="all">All Overall Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected / Flagged</option>
                    </select>
                    <select id="teamLabFilter"
                        class="filter-select">
                        <option value="all">All Labs</option>
                        <option value="Electronics Lab">Electronics Lab</option>
                        <option value="Mechanical Lab">Mechanical Lab</option>
                        <option value="Robotics Lab">Robotics Lab</option>
                        <option value="Fabrication Lab">Fabrication Lab</option>
                        <option value="IoT Lab">IoT Lab</option>
                    </select>
                    <button id="clearTeamFilters" class="btn equipment-tracking-style-dc251b">Clear
                        Filters</button>
                </div>

                <!-- CARDS GRID -->
                <div class="cards-grid" id="trackingCardsGrid" class="equipment-tracking-style-03ed67">
                    <!-- Rendered programmatically -->
                </div>
                <!-- EQUIPMENT STATUS MANAGEMENT PANEL -->
                <div class="status-panel" id="statusMgmtPanel">
                    <div class="status-panel-header">
                        <div class="status-panel-title">
                            <div class="status-panel-icon">🔧</div>
                            Equipment Status Management
                        </div>
                        <div class="equipment-tracking-style-77dbb8">

                            <div class="equipment-tracking-style-4cb8ce">
                                <input type="text" id="statusSearchPanel" placeholder="Search equipment..."
                                    class="equipment-tracking-style-5400c5">
                                <span
                                    class="equipment-tracking-style-572e3b">🔍</span>
                            </div>
                        </div>
                    </div>
                    <div class="eq-status-list" id="eqStatusList">
                        <!-- Rendered by equipment.js -->
                    </div>
                    <div id="eqStatusEmpty" class="equipment-tracking-style-2ad489">
                        <div class="equipment-tracking-style-c83d5d">⚙️</div>
                        <div class="equipment-tracking-style-a5d2ba">No equipment found</div>
                    </div>
                </div>

                <!-- PAGINATION CONTROLS -->
                <div
                    class="equipment-tracking-style-c0a057">
                    <div id="paginationInfo" class="equipment-tracking-style-d4b16f">
                        Showing 0-0 of 0 teams
                    </div>
                    <div class="equipment-tracking-style-13262f">
                        <button id="prevPageBtn" class="btn equipment-tracking-style-2c4d09">Previous</button>
                        <button id="nextPageBtn" class="btn btn-primary equipment-tracking-style-4777c2">Next</button>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <footer class="page-footer">
                &copy; 2025 RPLMS - Rapid Prototyping Lab Management System. All rights reserved.
            </footer>

        </main>

    </div>

    
    
    

    <script src="assets/js/global.js"></script>
    <script src="assets/js/equipment-tracking.js"></script>
    </body>

</html>
