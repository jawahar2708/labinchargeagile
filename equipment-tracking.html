<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Tracking - RPLMS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/equipment-tracking.css">
    <!-- Keep lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    </head>

<body>

    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="sidebar"></aside>

        <!-- MAIN PANEL -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggleBtn">&#9776;</button>
                    <div class="page-title-area">
                        <h1 class="page-title">Equipment Approvals</h1>
                        <ul class="breadcrumbs">
                            <li>Home</li>
                            <li>Equipment Approvals</li>
                        </ul>
                    </div>
                </div>

                <div class="header-right">
                    <button class="header-icon-btn">
                        <span class="icon">&#128276;</span>
                        <span class="icon-badge">3</span>
                    </button>
                    <div class="header-date-widget"></div>
                </div>
            </header>

            <!-- CONTENT BODY -->
            <div class="page-content-wrapper" style="max-width: 1200px; margin: 0 auto; padding: 24px;">

                <!-- KPI METRICS GRID -->
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px;">
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: #6B7280; letter-spacing: 0.5px;">
                            Total Team Requests</div>
                        <div id="kpiTotalTeams"
                            style="font-size: 28px; font-weight: 800; color: #111827; margin-top: 8px;">0</div>
                    </div>
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--orange); letter-spacing: 0.5px;">
                            Pending Approvals</div>
                        <div id="kpiPendingTeams"
                            style="font-size: 28px; font-weight: 800; color: var(--orange); margin-top: 8px;">0</div>
                    </div>
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--green); letter-spacing: 0.5px;">
                            Approved Requests</div>
                        <div id="kpiApprovedTeams"
                            style="font-size: 28px; font-weight: 800; color: var(--green); margin-top: 8px;">0</div>
                    </div>
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--red); letter-spacing: 0.5px;">
                            Rejected & Flagged</div>
                        <div id="kpiRejectedTeams"
                            style="font-size: 28px; font-weight: 800; color: var(--red); margin-top: 8px;">0</div>
                    </div>
                </div>

                <!-- SEARCH & FILTER BAR -->
                <div
                    style="display: flex; gap: 16px; align-items: center; background: #fff; padding: 16px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 24px; flex-wrap: wrap;">
                    <div style="flex-grow: 1; min-width: 250px;">
                        <input type="text" id="teamSearchInput" placeholder="Search by Team ID, Team Name, or Asset..."
                            style="width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; outline: none; box-sizing: border-box;">
                    </div>
                    <select id="teamStatusFilter"
                        style="padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; background: #fff; cursor: pointer;">
                        <option value="all">All Overall Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected / Flagged</option>
                    </select>
                    <select id="teamLabFilter"
                        style="padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; background: #fff; cursor: pointer;">
                        <option value="all">All Labs</option>
                        <option value="Electronics Lab">Electronics Lab</option>
                        <option value="Mechanical Lab">Mechanical Lab</option>
                        <option value="Robotics Lab">Robotics Lab</option>
                        <option value="Fabrication Lab">Fabrication Lab</option>
                        <option value="IoT Lab">IoT Lab</option>
                    </select>
                    <button id="clearTeamFilters" class="btn"
                        style="width: auto; padding: 10px 16px; border-radius: 8px; font-size: 13.5px; background:#E5E7EB; color:#1F2937;">Clear
                        Filters</button>
                </div>

                <!-- CARDS GRID -->
                <div class="cards-grid" id="trackingCardsGrid" style="margin-top: 0; margin-bottom: 24px;">
                    <!-- Rendered programmatically -->
                </div>
                <!-- EQUIPMENT STATUS MANAGEMENT PANEL -->
                <div class="status-panel" id="statusMgmtPanel">
                    <div class="status-panel-header">
                        <div class="status-panel-title">
                            <div class="status-panel-icon">🔧</div>
                            Equipment Status Management
                        </div>
                        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">

                            <div style="position:relative;">
                                <input type="text" id="statusSearchPanel" placeholder="Search equipment..."
                                    style="padding:8px 12px 8px 32px; border:1.5px solid #E5E7EB; border-radius:8px; font-size:12.5px; font-family:inherit; outline:none; min-width:200px;">
                                <span
                                    style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#9CA3AF;">🔍</span>
                            </div>
                        </div>
                    </div>
                    <div class="eq-status-list" id="eqStatusList">
                        <!-- Rendered by equipment.js -->
                    </div>
                    <div id="eqStatusEmpty" style="display:none; text-align:center; padding:32px; color:#6B7280;">
                        <div style="font-size:32px; margin-bottom:8px;">⚙️</div>
                        <div style="font-weight:600;">No equipment found</div>
                    </div>
                </div>

                <!-- PAGINATION CONTROLS -->
                <div
                    style="display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 20px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 24px;">
                    <div id="paginationInfo" style="font-size: 13.5px; color: #4B5563; font-weight: 500;">
                        Showing 0-0 of 0 teams
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button id="prevPageBtn" class="btn"
                            style="width: auto; padding: 8px 16px; border-radius: 8px; font-size: 13px; background:#E5E7EB; color:#1F2937;">Previous</button>
                        <button id="nextPageBtn" class="btn btn-primary"
                            style="width: auto; padding: 8px 16px; border-radius: 8px; font-size: 13px;">Next</button>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <footer class="page-footer">
                &copy; 2025 RPLMS - Rapid Prototyping Lab Management System. All rights reserved.
            </footer>

        </main>

    </div>

    
    
    

    <script src="assets/js/global.js"></script>
    <script src="assets/js/equipment-tracking.js"></script>
    </body>

</html>
